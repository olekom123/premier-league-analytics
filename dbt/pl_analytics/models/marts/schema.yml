version: 2

models:
  - name: fct_results
    description: "One row per team per match, with points and outcome"
    columns:
      - name: team
        tests:
          - not_null
      - name: venue
        tests:
          - accepted_values:
              arguments:
                values: ['home', 'away']
      - name: outcome
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['win', 'draw', 'loss']
      - name: points
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 3]
  - name: fct_standings
    description: "Current league table aggregated from fct_results"
    tests:
      - unique:
          column_name: "season || '|' || team"
    columns:
      - name: team
        tests:
          - not_null
      - name: total_points
        tests:
          - not_null
  - name: fct_team_form
    description: "Last 5 results per team with form string and points"
    tests:
      - unique:
          column_name: "season || '|' || team"
    columns:
      - name: team
        tests:
          - not_null
      - name: form
        tests:
          - not_null
      - name: points_last_5
        tests:
          - not_null
  - name: fct_team_season_stats
    description: "Per team per season aggregated stats for home and away performance"
    columns:
      - name: team
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: total_points
        tests:
          - not_null
  - name: fct_prediction_results
    description: "Joins Poisson model predictions with actual match results to enable accuracy evaluation"
    columns:
      - name: fixture_id
        tests:
          - not_null
          - unique
      - name: was_correct
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]
  - name: fct_model_performance
    description: "Aggregated accuracy metrics for the Poisson prediction model, segmented by predicted and actual outcome"
    columns:
      - name: segment
        tests:
          - not_null
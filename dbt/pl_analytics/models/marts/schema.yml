version: 2

models:
  - name: fct_results
    description: "One row per team per match, with points and outcome"
    columns:
      - name: match_id
        description: "Unique match identifier"
        tests:
          - not_null
      - name: team
        tests:
          - not_null
      - name: venue
        tests:
          - accepted_values:
              arguments:
                values: ['home', 'away']
      - name: outcome
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['win', 'draw', 'loss']
      - name: points
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 3]
  - name: fct_standings
    description: "Current league table aggregated from fct_results"
    columns:
      - name: team
        tests:
          - unique
          - not_null
      - name: total_points
        tests:
          - not_null
  - name: fct_team_form
    description: "Last 5 results per team with form string and points"
    columns:
      - name: team
        tests:
          - unique
          - not_null
      - name: form
        tests:
          - not_null
      - name: points_last_5
        tests:
          - not_null
  - name: fct_team_season_stats
    description: "Per team per season aggregated stats for home and away performance"
    columns:
      - name: team
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: total_points
        tests:
          - not_null
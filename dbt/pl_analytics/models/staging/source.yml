version: 2

sources:
  - name: main
    description: "Raw data loaded into DuckDB via Python ingestion scripts"
    tables:
      - name: raw_matches_historical
        description: "Historical PL match results and odds from football-data.co.uk (21 seasons). Loaded by ingestion/fetch_historical.py"
        columns:
          - name: HomeTeam
            tests:
              - not_null
          - name: AwayTeam
            tests:
              - not_null
          - name: Date
            tests:
              - not_null

      - name: raw_fixtures
        description: "Upcoming PL fixtures from football-data.org API. Loaded by ingestion/fetch_fixtures.py"
        columns:
          - name: home_team
            tests:
              - not_null
          - name: away_team
            tests:
              - not_null

      - name: raw_predictions
        description: "Historical predictions generated by the Poisson model. Loaded by ingestion/predict_match.py. Append-only — never dropped."
        columns:
          - name: fixture_id
            tests:
              - not_null
          - name: home_team
            tests:
              - not_null
          - name: away_team
            tests:
              - not_null